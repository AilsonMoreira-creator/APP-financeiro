<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Conectando ao Bling...</title>
<style>
  body{font-family:Georgia,serif;background:#f7f4f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
  .box{background:#fff;border-radius:16px;padding:40px;border:1px solid #e8e2da;text-align:center;max-width:520px;width:90%;}
  .logo{width:48px;height:48px;border-radius:10px;background:#4CAF73;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;font-family:Arial;margin:0 auto 16px;}
  h2{color:#2c3e50;font-size:20px;margin:0 0 8px;}
  p{color:#8a9aa4;font-size:13px;margin:0 0 16px;}
  .status{font-size:13px;padding:10px 16px;border-radius:8px;margin-top:12px;word-break:break-all;}
  .ok{background:#eafbf0;color:#27ae60;border:1px solid #b8dfc8;}
  .err{background:#fdeaea;color:#c0392b;border:1px solid #f4b8b8;}
  .loading{background:#edf4fb;color:#4a7fa5;border:1px solid #c8dff0;}
  .detail{margin-top:10px;background:#f5f5f5;border-radius:8px;padding:10px;font-size:11px;color:#666;text-align:left;max-height:200px;overflow:auto;word-break:break-all;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">B</div>
  <h2>Amícia × Bling</h2>
  <p>Autorizando a conta...</p>
  <div id="status" class="status loading">⏳ Processando...</div>
  <div id="detail" class="detail" style="display:none;"></div>
</div>

<script>
(async function(){
  const st=document.getElementById('status');
  const dt=document.getElementById('detail');
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  const state=params.get('state');

  function showError(msg, detail){
    st.className='status err';
    st.textContent='⚠ '+msg;
    if(detail){dt.style.display='block';dt.textContent=typeof detail==='object'?JSON.stringify(detail,null,2):detail;}
  }

  if(!code||!state){showError('Parâmetros inválidos. Feche e tente novamente.');return;}

  // Lê credenciais da conta específica (salvas pelo App antes de abrir o auth URL)
  const clientId=localStorage.getItem('bling_auth_id');
  const clientSecret=localStorage.getItem('bling_auth_secret');

  if(!clientId||!clientSecret){showError('Credenciais não encontradas. Configure no módulo Bling primeiro.');return;}

  try{
    const callback=window.location.origin+'/bling-callback.html';
    st.textContent='⏳ Trocando código por token...';

    const resp=await fetch('/api/bling-token',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        client_id:clientId,
        client_secret:clientSecret,
        grant_type:'authorization_code',
        code:code,
        redirect_uri:callback
      })
    });

    const text=await resp.text();
    let data;
    try{data=JSON.parse(text);}catch{data=text;}

    if(!resp.ok){showError('Erro ao trocar o código: '+resp.status, data);return;}
    if(!data.access_token){showError('Resposta sem access_token', data);return;}

    const tokenData={
      access_token:data.access_token,
      refresh_token:data.refresh_token,
      expires_at:new Date(Date.now()+(data.expires_in||21600)*1000).toISOString()
    };

    // Salva no Supabase
    const SUPABASE_URL=localStorage.getItem('sb_url');
    const SUPABASE_KEY=localStorage.getItem('sb_key');

    if(SUPABASE_URL&&SUPABASE_KEY){
      const sbResp=await fetch(SUPABASE_URL+'/rest/v1/bling_tokens',{
        method:'POST',
        headers:{
          'apikey':SUPABASE_KEY,
          'Authorization':'Bearer '+SUPABASE_KEY,
          'Content-Type':'application/json',
          'Prefer':'resolution=merge-duplicates'
        },
        body:JSON.stringify({conta:state,...tokenData})
      });
      if(!sbResp.ok){
        const sbErr=await sbResp.text();
        showError('Token obtido mas erro ao salvar no Supabase: '+sbResp.status, sbErr);
      }
    }

    localStorage.setItem('bling_token_'+state,JSON.stringify(tokenData));

    st.className='status ok';
    st.textContent='✓ '+state.charAt(0).toUpperCase()+state.slice(1)+' conectada com sucesso! Pode fechar esta aba.';
    setTimeout(()=>window.close(),3000);

  }catch(e){
    showError('Erro inesperado: '+e.message, e.stack);
  }
})();
</script>
</body>
</html>
